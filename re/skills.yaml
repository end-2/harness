name: re
version: 1.0.0
description: >
  사용자와의 대화형 상호작용을 통해 요구사항을 점진적으로 도출, 분석, 명세, 검증하는
  요구사항 공학(Requirements Engineering) 스킬

agents:
  elicit:
    name: 요구사항 도출
    description: 사용자와 multi-turn 대화를 통해 모호한 요구를 구조화된 요구사항으로 점진적으로 도출
    system_prompt: agents/elicit.md
    prompt_template: prompts/elicit.md
    interaction_mode: multi-turn
    max_turns: 20
    adaptive_depth:
      lightweight:
        trigger: "입력이 한두 문장 수준의 모호한 요청"
        strategy: "넓은 범위의 탐색적 질문"
      heavyweight:
        trigger: "특정 기술/기능 언급 또는 구체적 스펙이 포함된 상세 입력"
        strategy: "세부 사항 확인 및 경계 조건/예외 확인 질문"
    input:
      user_request:
        type: string
        required: true
        description: 사용자의 자연어 요청 (한 문장부터 상세 RFP까지)
    output:
      requirements_candidates:
        type: array
        description: 구조화된 요구사항 후보 목록
        items:
          id: { type: string, pattern: "^(FR|NFR)-\\d{3}$" }
          category: { type: string }
          title: { type: string }
          description: { type: string }
          priority: { type: string, enum: [Must, Should, Could, "Won't"] }
          acceptance_criteria: { type: array, items: { type: string } }
          source: { type: string }
      constraints_candidates:
        type: array
        description: 식별된 제약 조건 후보
        items:
          id: { type: string, pattern: "^CON-\\d{3}$" }
          type: { type: string, enum: [technical, business, regulatory, environmental] }
          title: { type: string }
          description: { type: string }
      quality_attribute_hints:
        type: array
        description: 품질 속성 후보 및 사용자가 언급한 우선순위 힌트
        items:
          attribute: { type: string }
          hint: { type: string }
      open_questions:
        type: array
        description: 미해결 질문 목록
        items: { type: string }

  analyze:
    name: 요구사항 분석
    description: 요구사항의 완전성, 일관성, 실현 가능성을 분석하고 사용자에게 추가 질문
    system_prompt: agents/analyze.md
    prompt_template: prompts/analyze.md
    interaction_mode: multi-turn
    max_turns: 10
    input:
      elicit_output:
        type: object
        required: true
        description: elicit 에이전트의 산출물
    output:
      analysis_report:
        type: object
        description: 분석 리포트
        properties:
          conflicts: { type: array, description: 요구사항 간 충돌 }
          gaps: { type: array, description: 누락된 요구사항 }
          risks: { type: array, description: 위험 요소 }
          recommendations: { type: array, description: 개선 권고 }
      refined_requirements:
        type: array
        description: 정제된 요구사항 목록 (충돌 해소, 누락 보완)
      validated_constraints:
        type: array
        description: 검증된 제약 조건 목록
      quality_tradeoffs:
        type: array
        description: 품질 속성 간 트레이드오프 분석
      decision_questions:
        type: array
        description: 사용자 의사결정이 필요한 질문 목록

  spec:
    name: 요구사항 명세
    description: 분석된 요구사항을 후속 스킬이 소비할 수 있는 세 섹션 명세 문서로 구조화
    system_prompt: agents/spec.md
    prompt_template: prompts/spec.md
    interaction_mode: multi-turn
    max_turns: 10
    adaptive_depth:
      lightweight:
        trigger: "간단한 기능/단일 요청, 요구사항 5개 이하"
        format: "User Story + Acceptance Criteria"
      heavyweight:
        trigger: "복잡한 시스템/다수 요구사항, 요구사항 10개 이상"
        format: "IEEE 830 / ISO 29148 기반 SRS"
    input:
      analyzed_requirements:
        type: object
        required: true
        description: analyze 에이전트의 산출물 + 사용자 의사결정 결과
    output:
      requirements_spec:
        type: array
        required: true
        description: "기능/비기능 요구사항 명세 (FR-xxx, NFR-xxx)"
        items:
          id: { type: string }
          category: { type: string }
          title: { type: string }
          description: { type: string }
          priority: { type: string, enum: [Must, Should, Could, "Won't"] }
          acceptance_criteria: { type: array }
          source: { type: string }
          dependencies: { type: array }
      constraints:
        type: array
        required: true
        description: 제약 조건 목록
        items:
          id: { type: string, pattern: "^CON-\\d{3}$" }
          type: { type: string, enum: [technical, business, regulatory, environmental] }
          title: { type: string }
          description: { type: string }
          rationale: { type: string }
          impact: { type: string }
          flexibility: { type: string, enum: [hard, soft, negotiable] }
      quality_attribute_priorities:
        type: array
        required: true
        description: 품질 속성 우선순위
        items:
          attribute: { type: string }
          priority: { type: integer, minimum: 1 }
          description: { type: string }
          metric: { type: string }
          trade_off_notes: { type: string }

  review:
    name: 요구사항 리뷰
    description: 명세 문서의 세 섹션별 리뷰 및 후속 스킬 소비 적합성 검증
    system_prompt: agents/review.md
    prompt_template: prompts/review.md
    interaction_mode: multi-turn
    max_turns: 5
    input:
      spec_output:
        type: object
        required: true
        description: spec 에이전트의 산출물 (세 섹션 명세 문서)
    output:
      review_report:
        type: object
        description: 섹션별 리뷰 리포트
        properties:
          requirements_review:
            type: object
            description: 요구사항 명세 검증 결과
          constraints_review:
            type: object
            description: 제약 조건 검증 결과
          quality_attributes_review:
            type: object
            description: 품질 속성 우선순위 검증 결과
          downstream_readiness:
            type: object
            description: 후속 스킬 소비 적합성 판정
          escalations:
            type: array
            description: 사용자 확인 필요 사항

pipeline:
  stages:
    - agent: elicit
      checkpoint: true
      description: 사용자와 대화하여 요구사항 도출
    - agent: analyze
      checkpoint: true
      description: 도출된 요구사항 분석 및 사용자 의사결정
    - agent: spec
      checkpoint: true
      description: 세 섹션 명세 문서 작성 및 사용자 확인
    - agent: review
      checkpoint: true
      description: 명세 문서 리뷰 및 최종 승인

consumers:
  - skill: arch
    consumes: [requirements_spec, constraints, quality_attribute_priorities]
    usage: 아키텍처 드라이버 및 설계 제약
  - skill: qa
    consumes: [requirements_spec, quality_attribute_priorities]
    usage: 테스트 대상 도출 및 NFR 테스트 기준
  - skill: impl
    consumes: [requirements_spec, constraints]
    usage: 구현 범위 및 제약
  - skill: sec
    consumes: [quality_attribute_priorities, constraints]
    usage: 보안 우선순위 및 규제 제약
  - skill: devops
    consumes: [quality_attribute_priorities, constraints]
    usage: SLO 기준 및 배포 제약
