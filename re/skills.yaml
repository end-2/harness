name: re
version: 1.1.0
description: >
  사용자와의 대화형 상호작용을 통해 요구사항을 점진적으로 도출, 분석, 명세, 검증하는
  요구사항 공학(Requirements Engineering) 스킬

dependencies:
  upstream: []

agents:
  elicit:
    name: 요구사항 도출
    description: 사용자와 multi-turn 대화를 통해 모호한 요구를 구조화된 요구사항으로 점진적으로 도출
    system_prompt: agents/elicit.md
    prompt_template: prompts/elicit.md
    interaction_mode: multi-turn
    max_turns: 15
    adaptive_depth:
      lightweight:
        trigger: "구체적 스펙이 포함된 상세 입력 또는 특정 기술/기능을 언급하는 중간 수준 입력"
        strategy: "경계 조건/예외/세부 사항 확인 질문 중심"
      heavyweight:
        trigger: "한두 문장 수준의 모호한 요청 또는 비전 수준의 고수준 입력"
        strategy: "넓은 범위의 탐색적 질문 → 점진적 구체화"
    input:
      user_request:
        type: string
        required: true
        description: 사용자의 자연어 요청 (한 문장부터 상세 RFP까지)
    output:
      requirements_candidates:
        type: array
        required: true
        description: 구조화된 요구사항 후보 목록
        items:
          id: { type: string, pattern: "^(FR|NFR)-\\d{3}$" }
          category: { type: string }
          title: { type: string }
          description: { type: string }
          priority: { type: string, enum: [Must, Should, Could, "Won't"] }
          acceptance_criteria: { type: array, items: { type: string } }
          source: { type: string }
      constraints_candidates:
        type: array
        required: true
        description: 식별된 제약 조건 후보
        items:
          id: { type: string, pattern: "^CON-\\d{3}$" }
          type: { type: string, enum: [technical, business, regulatory, environmental] }
          title: { type: string }
          description: { type: string }
      quality_attribute_hints:
        type: array
        required: true
        description: 품질 속성 후보 및 사용자가 언급한 우선순위 힌트
        items:
          attribute: { type: string }
          hint: { type: string }
      open_questions:
        type: array
        required: true
        description: 미해결 질문 목록
        items: { type: string }

  analyze:
    name: 요구사항 분석
    description: 요구사항의 완전성, 일관성, 실현 가능성을 분석하고 사용자에게 추가 질문
    system_prompt: agents/analyze.md
    prompt_template: prompts/analyze.md
    interaction_mode: multi-turn
    max_turns: 10
    adaptive_depth:
      lightweight:
        trigger: "요구사항 5개 이하, 제약 조건 3개 이하"
        strategy: "핵심 충돌/누락만 점검, 트레이드오프 요약"
      heavyweight:
        trigger: "요구사항 6개 이상 또는 제약 조건 4개 이상"
        strategy: "전체 충돌 매트릭스, 상세 누락 체크리스트, 실현 가능성 평가"
    input:
      requirements_candidates:
        type: array
        required: true
        description: "elicit 산출물 — 구조화된 요구사항 후보 목록"
        items:
          id: { type: string, pattern: "^(FR|NFR)-\\d{3}$" }
          category: { type: string }
          title: { type: string }
          description: { type: string }
          priority: { type: string, enum: [Must, Should, Could, "Won't"] }
          acceptance_criteria: { type: array, items: { type: string } }
          source: { type: string }
      constraints_candidates:
        type: array
        required: true
        description: "elicit 산출물 — 식별된 제약 조건 후보"
        items:
          id: { type: string, pattern: "^CON-\\d{3}$" }
          type: { type: string, enum: [technical, business, regulatory, environmental] }
          title: { type: string }
          description: { type: string }
      quality_attribute_hints:
        type: array
        required: true
        description: "elicit 산출물 — 품질 속성 후보 및 우선순위 힌트"
        items:
          attribute: { type: string }
          hint: { type: string }
      open_questions:
        type: array
        required: true
        description: "elicit 산출물 — 미해결 질문 목록"
        items: { type: string }
    output:
      analysis_report:
        type: object
        required: true
        description: 분석 리포트
        properties:
          conflicts:
            type: array
            description: 요구사항 간 충돌
            items:
              requirement_a: { type: string }
              requirement_b: { type: string }
              conflict_type: { type: string, enum: [direct, resource, implicit] }
              description: { type: string }
              resolution_options: { type: array, items: { type: string } }
          gaps:
            type: array
            description: 누락된 요구사항
            items:
              area: { type: string }
              description: { type: string }
              severity: { type: string, enum: [Critical, Major, Minor] }
              recommendation: { type: string }
          risks:
            type: array
            description: 위험 요소
            items:
              requirement_id: { type: string }
              risk_type: { type: string }
              description: { type: string }
              mitigation: { type: string }
      refined_requirements:
        type: array
        required: true
        description: 정제된 요구사항 목록 (충돌 해소, 누락 보완)
        items:
          id: { type: string, pattern: "^(FR|NFR)-\\d{3}$" }
          category: { type: string }
          title: { type: string }
          description: { type: string }
          priority: { type: string, enum: [Must, Should, Could, "Won't"] }
          acceptance_criteria: { type: array, items: { type: string } }
          source: { type: string }
      validated_constraints:
        type: array
        required: true
        description: 검증된 제약 조건 목록
        items:
          id: { type: string, pattern: "^CON-\\d{3}$" }
          type: { type: string, enum: [technical, business, regulatory, environmental] }
          title: { type: string }
          description: { type: string }
      quality_tradeoffs:
        type: array
        required: true
        description: 품질 속성 간 트레이드오프 분석
        items:
          attribute_a: { type: string }
          attribute_b: { type: string }
          tradeoff_description: { type: string }
          user_decision: { type: string }
      decision_questions:
        type: array
        required: true
        description: 사용자 의사결정이 필요한 질문 목록
        items:
          id: { type: string, pattern: "^Q-\\d{3}$" }
          description: { type: string }
          options: { type: array, items: { type: string } }

  spec:
    name: 요구사항 명세
    description: 분석된 요구사항을 후속 스킬이 소비할 수 있는 세 섹션 명세 문서로 구조화
    system_prompt: agents/spec.md
    prompt_template: prompts/spec.md
    interaction_mode: multi-turn
    max_turns: 10
    adaptive_depth:
      lightweight:
        trigger: "요구사항 7개 이하, 단일 기능 또는 단순 CRUD"
        format: "User Story + Acceptance Criteria"
      heavyweight:
        trigger: "요구사항 8개 이상, 다수 하위 시스템 또는 규제 요구사항 존재"
        format: "IEEE 830 / ISO 29148 기반 SRS"
    input:
      refined_requirements:
        type: array
        required: true
        description: "analyze 산출물 — 정제된 요구사항 목록"
        items:
          id: { type: string, pattern: "^(FR|NFR)-\\d{3}$" }
          category: { type: string }
          title: { type: string }
          description: { type: string }
          priority: { type: string, enum: [Must, Should, Could, "Won't"] }
          acceptance_criteria: { type: array, items: { type: string } }
          source: { type: string }
      validated_constraints:
        type: array
        required: true
        description: "analyze 산출물 — 검증된 제약 조건 목록"
        items:
          id: { type: string, pattern: "^CON-\\d{3}$" }
          type: { type: string, enum: [technical, business, regulatory, environmental] }
          title: { type: string }
          description: { type: string }
      quality_tradeoffs:
        type: array
        required: true
        description: "analyze 산출물 — 품질 속성 간 트레이드오프 분석"
        items:
          attribute_a: { type: string }
          attribute_b: { type: string }
          tradeoff_description: { type: string }
          user_decision: { type: string }
      user_decisions:
        type: array
        required: true
        description: "사용자 의사결정 결과 목록"
        items:
          question_id: { type: string }
          decision: { type: string }
    output:
      requirements_spec:
        type: array
        required: true
        description: "기능/비기능 요구사항 명세 (FR-xxx, NFR-xxx)"
        items:
          id: { type: string, pattern: "^(FR|NFR)-\\d{3}$" }
          category: { type: string }
          title: { type: string }
          description: { type: string }
          priority: { type: string, enum: [Must, Should, Could, "Won't"] }
          acceptance_criteria: { type: array, items: { type: string } }
          source: { type: string }
          dependencies: { type: array, items: { type: string } }
      excluded_items:
        type: array
        required: true
        description: "의도적으로 제외된 항목 (Won't 항목 포함)"
        items:
          id: { type: string }
          title: { type: string }
          reason: { type: string }
          reconsider_trigger: { type: string }
      constraints:
        type: array
        required: true
        description: 제약 조건 목록
        items:
          id: { type: string, pattern: "^CON-\\d{3}$" }
          type: { type: string, enum: [technical, business, regulatory, environmental] }
          title: { type: string }
          description: { type: string }
          rationale: { type: string }
          impact: { type: string }
          flexibility: { type: string, enum: [hard, soft, negotiable] }
      quality_attribute_priorities:
        type: array
        required: true
        description: 품질 속성 우선순위
        items:
          attribute: { type: string }
          priority: { type: integer, minimum: 1 }
          description: { type: string }
          metric: { type: string }
          trade_off_notes: { type: string }

  review:
    name: 요구사항 리뷰
    description: 명세 문서의 세 섹션별 리뷰 및 후속 스킬 소비 적합성 검증
    system_prompt: agents/review.md
    prompt_template: prompts/review.md
    interaction_mode: multi-turn
    max_turns: 8
    input:
      requirements_spec:
        type: array
        required: true
        description: "spec 산출물 — 기능/비기능 요구사항 명세"
        items:
          id: { type: string, pattern: "^(FR|NFR)-\\d{3}$" }
          category: { type: string }
          title: { type: string }
          description: { type: string }
          priority: { type: string, enum: [Must, Should, Could, "Won't"] }
          acceptance_criteria: { type: array, items: { type: string } }
          source: { type: string }
          dependencies: { type: array, items: { type: string } }
      excluded_items:
        type: array
        required: true
        description: "spec 산출물 — 의도적으로 제외된 항목"
        items:
          id: { type: string }
          title: { type: string }
          reason: { type: string }
          reconsider_trigger: { type: string }
      constraints:
        type: array
        required: true
        description: "spec 산출물 — 제약 조건 목록"
        items:
          id: { type: string, pattern: "^CON-\\d{3}$" }
          type: { type: string, enum: [technical, business, regulatory, environmental] }
          title: { type: string }
          description: { type: string }
          rationale: { type: string }
          impact: { type: string }
          flexibility: { type: string, enum: [hard, soft, negotiable] }
      quality_attribute_priorities:
        type: array
        required: true
        description: "spec 산출물 — 품질 속성 우선순위"
        items:
          attribute: { type: string }
          priority: { type: integer, minimum: 1 }
          description: { type: string }
          metric: { type: string }
          trade_off_notes: { type: string }
    output:
      review_report:
        type: object
        required: true
        description: 섹션별 리뷰 리포트
        properties:
          requirements_review:
            type: array
            description: 요구사항 명세 검증 결과
            items:
              id: { type: string }
              issue: { type: string }
              severity: { type: string, enum: [Critical, Major, Minor, Info] }
              suggestion: { type: string }
          constraints_review:
            type: array
            description: 제약 조건 검증 결과
            items:
              id: { type: string }
              issue: { type: string }
              severity: { type: string, enum: [Critical, Major, Minor, Info] }
              suggestion: { type: string }
          quality_attributes_review:
            type: array
            description: 품질 속성 우선순위 검증 결과
            items:
              attribute: { type: string }
              issue: { type: string }
              severity: { type: string, enum: [Critical, Major, Minor, Info] }
              suggestion: { type: string }
          downstream_readiness:
            type: array
            description: 후속 스킬 소비 적합성 판정
            items:
              skill: { type: string }
              verdict: { type: string, enum: [PASS, CONDITIONAL, FAIL] }
              missing_info: { type: string }
          escalations:
            type: array
            description: 사용자 확인 필요 사항
            items:
              id: { type: string, pattern: "^ESC-\\d{3}$" }
              description: { type: string }
              options: { type: array, items: { type: string } }
      verdict:
        type: string
        required: true
        enum: [APPROVED, CONDITIONAL, REJECTED]
        description: "최종 판정 — REJECTED 시 on_rejected 규칙에 따라 spec 또는 analyze로 회귀"

pipeline:
  stages:
    - agent: elicit
      checkpoint: true
      description: 사용자와 대화하여 요구사항 도출
    - agent: analyze
      checkpoint: true
      description: 도출된 요구사항 분석 및 사용자 의사결정
    - agent: spec
      checkpoint: true
      description: 세 섹션 명세 문서 작성 및 사용자 확인
    - agent: review
      checkpoint: true
      description: 명세 문서 리뷰 및 최종 승인
      on_rejected:
        target: spec
        description: "REJECTED 판정 시 Critical 이슈 목록과 함께 spec 에이전트로 회귀하여 수정 후 재리뷰"
      on_conditional:
        action: proceed_with_notes
        description: "CONDITIONAL 판정 시 Minor 이슈 목록을 후속 스킬에 전달하며 진행"

consumers:
  - skill: arch
    agent: design
    consumes: [requirements_spec, constraints, quality_attribute_priorities]
    usage: 아키텍처 드라이버 및 설계 제약
  - skill: qa
    agent: strategy
    consumes: [requirements_spec, quality_attribute_priorities]
    usage: 테스트 대상 도출 및 NFR 테스트 기준
  - skill: impl
    agent: generate
    consumes: [requirements_spec, constraints]
    usage: 구현 범위 및 제약
  - skill: sec
    agent: threat-model
    consumes: [quality_attribute_priorities, constraints]
    usage: 보안 우선순위 및 규제 제약
  - skill: devops
    agent: slo
    consumes: [quality_attribute_priorities, constraints]
    usage: SLO 기준 및 배포 제약
