name: orch
version: 1.0.0
description: >
  모든 스킬(ex, re, arch, impl, qa, sec, devops)의 실행을 조율하는 컨트롤 플레인.
  사용자는 항상 이 orchestration을 통해 통신하며, 개별 스킬을 직접 호출하지 않는다.
  사용자 요청 분석 및 라우팅, 파이프라인 기반 스킬 실행(순차/병렬),
  실행별 산출물 관리, 사용자 대화 중계, 실행 재개를 지원한다.

agents:
  dispatch:
    name: 디스패치
    description: 사용자의 유일한 진입점. 자연어 요청을 분석하여 스킬 또는 파이프라인으로 라우팅
    system_prompt: agents/dispatch.md
    prompt_template: prompts/dispatch.md
    interaction_mode: dialogue
    escalation_only: false
    input:
      user_request:
        type: string
        required: true
        description: "사용자의 자연어 요청"
      current_run_state:
        type: string
        required: false
        description: "current-run.md의 내용 (현재 실행 상태 스냅샷)"
      output_root:
        type: string
        required: false
        description: "산출물 출력 루트 경로 (기본: ./harness-output/)"
    output:
      dispatch_result:
        type: object
        required: true
        description: "라우팅 결과 — 파이프라인 시작, 재개, 또는 단일 스킬 호출"
        properties:
          action: { type: string, enum: [new_pipeline, resume, single_skill] }
          pipeline: { type: string }
          user_request: { type: string }
          project_root: { type: string }
          run_id: { type: string }
          resume_from: { type: string }
          parameters: { type: object }

  pipeline:
    name: 파이프라인
    description: DAG 기반 워크플로 실행, 스킬 간 흐름 제어, 에이전트 스폰
    system_prompt: agents/pipeline.md
    prompt_template: prompts/pipeline.md
    interaction_mode: auto-execute
    escalation_only: false
    input:
      pipeline_name:
        type: string
        required: true
        description: "실행할 파이프라인명"
      pipeline_definition:
        type: object
        required: true
        description: "파이프라인 정의 (스킬 목록, 실행 순서, 병렬 그룹)"
      run_id:
        type: string
        required: true
        description: "실행 ID"
      output_path:
        type: string
        required: true
        description: "산출물 경로 (<output-root>/runs/<run-id>/)"
      resume_mode:
        type: boolean
        required: false
        description: "재개 모드 여부 (기본: false)"
      resume_from:
        type: string
        required: false
        description: "재개 시작 스킬:에이전트"
    output:
      pipeline_result:
        type: object
        required: true
        description: "파이프라인 실행 결과"
        properties:
          pipeline: { type: string }
          run_id: { type: string }
          status: { type: string, enum: [completed, failed] }
          steps_completed: { type: integer }
          steps_total: { type: integer }
          summary: { type: string }
          outputs:
            type: array
            items:
              skill: { type: string }
              sections: { type: array, items: { type: string } }
              status: { type: string }

  relay:
    name: 릴레이
    description: 스킬 에이전트와 사용자 간의 멀티턴 대화 중계
    system_prompt: agents/relay.md
    prompt_template: prompts/relay.md
    interaction_mode: dialogue
    escalation_only: false
    input:
      needs_user_input:
        type: object
        required: true
        description: "스킬 에이전트의 needs_user_input 신호"
      conversation_summary:
        type: string
        required: false
        description: "이전 턴들의 누적 대화 요약"
      skill_info:
        type: string
        required: true
        description: "스킬:에이전트 식별자"
    output:
      user_response:
        type: object
        required: true
        description: "사용자 응답 패키지"
        properties:
          skill: { type: string }
          turn: { type: integer }
          answers:
            type: array
            items:
              question_id: { type: string }
              response: { type: string }
          conversation_summary: { type: string }

  run:
    name: 실행 관리
    description: 실행(run) 생명주기 관리, 디렉토리 생성, 산출물 검증/저장, 상태 추적, 재개 지원
    system_prompt: agents/run.md
    prompt_template: prompts/run.md
    interaction_mode: auto-execute
    escalation_only: true
    input:
      action:
        type: string
        required: true
        description: "실행할 액션"
        enum: [init, update_status, validate_and_save, generate_docs, cleanup, resume]
      pipeline_name:
        type: string
        required: false
        description: "파이프라인명 (init 시)"
      output_root:
        type: string
        required: false
        description: "산출물 출력 루트 (기본: ./harness-output/)"
      run_id:
        type: string
        required: false
        description: "실행 ID"
      skill_output:
        type: object
        required: false
        description: "스킬 산출물 (validate_and_save ���)"
      skill_info:
        type: string
        required: false
        description: "스킬 식별자"
    output:
      run_result:
        type: object
        required: true
        description: "실행 관리 결과"
        properties:
          action: { type: string }
          run_id: { type: string }
          status: { type: string }
          output_path: { type: string }
          message: { type: string }

  config:
    name: 설정 관리
    description: 스킬 설정, 에이전트 규칙, 파이프라인 템플릿 관리
    system_prompt: agents/config.md
    prompt_template: prompts/config.md
    interaction_mode: dialogue
    escalation_only: false
    input:
      config_request:
        type: string
        required: true
        description: "설정 변경/조회 요청"
      current_settings:
        type: object
        required: false
        description: "현재 설정 값"
    output:
      config_result:
        type: object
        required: true
        description: "설정 변경/조회 결과"
        properties:
          action: { type: string, enum: [get, set, validate] }
          target: { type: string }
          status: { type: string, enum: [success, error] }
          current_value: { type: string }
          previous_value: { type: string }
          message: { type: string }

  status:
    name: 현황 조회
    description: 실행 이력 조회, 스킬 상태 확인, 산출물 검색
    system_prompt: agents/status.md
    prompt_template: prompts/status.md
    interaction_mode: auto-execute
    escalation_only: false
    input:
      status_request:
        type: string
        required: true
        description: "조회 요청 (스킬 목록, 실행 이력, 산출물 검색 등)"
      output_root:
        type: string
        required: false
        description: "산���물 루트 경로"
    output:
      status_result:
        type: object
        required: true
        description: "조회 결과"
        properties:
          query: { type: string }
          result_type: { type: string, enum: [skills, runs, run_detail, search, stats] }
          data: { type: object }

rules:
  - path: rules/base.md
    scope: all
    description: 모든 스폰되는 에이전트에 공통 적용되는 기본 행동 규칙
  - path: rules/output-format.md
    scope: all
    description: 산출물 Markdown 형식 및 메타데이터 헤더 규약
  - path: rules/escalation-protocol.md
    scope: all
    description: 에스컬레이션 조건 및 needs_user_input 사용 규약
  - path: rules/dialogue-protocol.md
    scope: all
    description: needs_user_input / user_response 신호의 정확한 구조 정의

pipelines:
  predefined:
    - name: full-sdlc
      path: pipelines/full-sdlc.md
      description: 새 시스템의 전체 SDLC — 요구사항부터 배포까지
      steps: [re:elicit, re:analyze, re:spec, arch:design, impl:generate, "[qa:generate, sec:audit, devops:pipeline]"]

    - name: full-sdlc-existing
      path: pipelines/full-sdlc-existing.md
      description: 기존 프로젝트의 전체 SDLC — 코드 분석 후 요구사항부터 배포까지
      steps: [ex:scan, ex:detect, ex:analyze, ex:map, re:elicit, re:analyze, re:spec, arch:design, impl:generate, "[qa:generate, sec:audit, devops:pipeline]"]

    - name: new-feature
      path: pipelines/new-feature.md
      description: 신규 기능 개발 — 요구사항, 설계, 구현, 테스트
      steps: [re:elicit, re:spec, arch:design, impl:generate, qa:generate]

    - name: new-feature-existing
      path: pipelines/new-feature-existing.md
      description: 기존 프로젝트에 신규 기능 개발
      steps: [ex:scan, ex:detect, ex:analyze, ex:map, re:elicit, re:spec, arch:design, impl:generate, qa:generate]

    - name: security-gate
      path: pipelines/security-gate.md
      description: 보안 게이트 — 위협 모델링, 감사, 규정 준수
      steps: [sec:threat-model, sec:audit, sec:compliance]

    - name: security-gate-existing
      path: pipelines/security-gate-existing.md
      description: 기존 프로젝트 보안 게이트
      steps: [ex:scan, ex:detect, ex:analyze, ex:map, sec:threat-model, sec:audit, sec:compliance]

    - name: quick-review
      path: pipelines/quick-review.md
      description: 빠른 리뷰 ��� 요구사항, 아���텍처, 구현 리뷰
      steps: [re:review, arch:review, impl:review]

    - name: explore
      path: pipelines/explore.md
      description: 코드베이스 탐색 — ex 스킬 단독 실행
      steps: [ex:scan, ex:detect, ex:analyze, ex:map]

dependencies:
  managed_skills:
    - skill: ex
      version: ">=1.0.0"
      agents: [scan, detect, analyze, map]
      usage: 기존 프로젝트 코드베이스 자동 분석
    - skill: re
      version: ">=1.0.0"
      agents: [elicit, analyze, spec, review]
      usage: 요구사항 도출, 분석, 명세, 리뷰
    - skill: arch
      version: ">=1.0.0"
      agents: [design, review, adr, diagram]
      usage: 아키텍처 설계, 리뷰, ADR, 다이어그램
    - skill: impl
      version: ">=1.0.0"
      agents: [generate, review, refactor, optimize]
      usage: 구현 생성, 리뷰, 리팩토링, 최적화
    - skill: qa
      version: ">=1.0.0"
      agents: [strategy, generate, review, report]
      usage: 테스트 전략, 생성, 리뷰, 품질 보고
    - skill: sec
      version: ">=1.0.0"
      agents: [threat-model, audit, review, compliance]
      usage: 위협 모델링, 보안 감사, 리뷰, 규정 준수
    - skill: devops
      version: ">=1.0.0"
      agents: [slo, iac, pipeline, strategy, monitor, log, incident, review]
      usage: SLO, IaC, CI/CD, 모니터링, 로깅, 인시던트, 운영 리뷰

output_structure:
  root: "<output-root>/runs/<run-id>/"
  files:
    - run.meta.md
    - project-structure.md
    - release-note.md
  skill_directories: [ex, re, arch, impl, qa, sec, devops]
  global_state: "<output-root>/current-run.md"

design_principles:
  - name: 단일 진입점
    description: 사용자는 항상 orchestration을 통해 통신. 개별 스킬 직접 호출 없음
  - name: 에이전트 기반 실행
    description: 모든 스킬은 Agent 도구를 통해 에이전트로 스폰되어 실행
  - name: 실행 격리
    description: 각 run은 독립된 디렉토리에 산출물 저장. 반복 사용 시 충돌 없음
  - name: 느슨한 결합
    description: 각 스킬은 독립적으로 동작 가능하며, orchestration은 조율 역할
  - name: 자기 기술적 (Self-describing)
    description: 각 스킬이 자신의 입출력을 명세하여 자동 연결 가능
  - name: 점진적 복잡성
    description: 단일 스킬 호출부터 복잡한 파이프라인까지 단계적 사용 가능
  - name: 관찰 가능성
    description: 모든 스킬 실행 과정이 run.meta.md에 기록되어 추적/디버깅 가능
  - name: 사용자 개입 중계
    description: 대화형 스킬의 질문과 자동 실행 스킬의 예외를 통일된 relay 메커니즘으로 전달
  - name: 재개 가능성
    description: current-run.md를 통해 활성 run을 즉시 식별하고, 중단된 실행을 상태 기반으로 재개
  - name: 빠른 컨텍스트 복원
    description: current-run.md 단일 파일로 현재 실행 상태를 즉시 파악 — 디렉토리 스캔 불필요
