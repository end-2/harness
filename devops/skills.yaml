name: devops
version: 1.0.0
description: >
  Arch/Impl 스킬의 산출물과 RE 품질 속성을 입력으로 받아, 설계된 시스템을 배포하고
  운영하기 위한 인프라, 파이프라인, 관찰 가능성, 운영 런북을 자동 생성하는 DevOps 스킬.
  배포(Deploy)와 관찰(Observe)을 하나의 피드백 루프로 통합하여, 배포 전략이 모니터링을
  결정하고 모니터링 결과가 배포 결정(롤백, 프로모션)에 피드백되는 연속 사이클을 구현한다.

execution_model: auto-execute-with-escalation
# 선행 스킬에서 의사결정이 완료된 상태이므로 자동 실행.
# 선행 결정이 DevOps 레벨에서 실현 불가능한 경우에만 사용자에게 에스컬레이션.

adaptive_depth:
  lightweight:
    trigger: "Arch 컴포넌트 ≤ 3개, 단일 배포 환경"
    output_level: "단일 파이프라인 + 기본 IaC + 핵심 SLO 3개 이내 + 기본 모니터링 + 핵심 런북"
  heavyweight:
    trigger: "Arch 컴포넌트 > 3개 또는 멀티 환경/리전"
    output_level: "멀티 스테이지 파이프라인 + 환경별 IaC 모듈 + 종합 SLO + RED/USE 모니터링 + 분산 추적 + 상세 런북 + 로깅 표준"

supported_platforms:
  ci_cd: [github-actions, jenkins, gitlab-ci]
  iac: [terraform, ansible, helm, pulumi]
  cloud: [aws, gcp, azure]
  monitoring: [prometheus, grafana, datadog, cloudwatch]
  logging: [elk, loki, cloudwatch-logs]

agents:
  slo:
    name: SLO 정의
    description: RE 품질 속성 메트릭을 SLI/SLO로 변환하여 전체 DevOps 파이프라인의 관찰 기준점을 수립
    system_prompt: agents/slo.md
    prompt_template: prompts/slo.md
    interaction_mode: auto
    escalation_condition: "RE 품질 속성 metric이 측정 가능한 SLI로 변환 불가능한 경우 (정성적 메트릭)"
    input:
      arch_output:
        type: object
        required: true
        description: Arch 스킬 산출물 (architecture_decisions, component_structure, technology_stack, diagrams)
      impl_output:
        type: object
        required: false
        description: Impl 스킬 산출물 (참조용)
    output:
      slo_definitions:
        type: array
        description: SLI/SLO 정의 목록
        items:
          id: { type: string, pattern: "^SLO-\\d{3}$" }
          sli: { type: string, description: "Service Level Indicator 정의 (PromQL/메트릭 쿼리)" }
          target: { type: string, description: "목표치 (예: ≥ 0.999)" }
          window: { type: string, description: "측정 기간 (예: 30d)" }
          error_budget: { type: string, description: "에러 버짓 (예: 0.1%)" }
          burn_rate_alert:
            type: object
            description: "번-레이트 알림 설정"
            properties:
              fast_burn: { type: object, description: "빠른 소진 (1h 윈도우)" }
              slow_burn: { type: object, description: "느린 소진 (6h 윈도우)" }
          re_refs: { type: array, items: { type: string }, description: "근거 RE 품질 속성 ID" }
          component_refs: { type: array, items: { type: string }, description: "대상 Arch 컴포넌트 ID" }

  iac:
    name: Infrastructure as Code
    description: Arch 컴포넌트 구조와 기술 스택을 기반으로 IaC 모듈을 자동 생성
    system_prompt: agents/iac.md
    prompt_template: prompts/iac.md
    interaction_mode: auto
    escalation_condition: "Arch가 선택한 기술이 대상 클라우드 프로바이더에서 관리형 서비스로 제공되지 않는 경우"
    input:
      arch_output:
        type: object
        required: true
        description: Arch 스킬 산출물 (component_structure, technology_stack, diagrams)
      slo_output:
        type: object
        required: true
        description: SLO 에이전트 산출물
    output:
      infrastructure_code:
        type: object
        description: IaC 산출물
        properties:
          id: { type: string, pattern: "^IAC-\\d{3}$" }
          tool: { type: string, enum: [terraform, ansible, helm, pulumi] }
          provider: { type: string, enum: [aws, gcp, azure] }
          modules:
            type: array
            items:
              name: { type: string }
              path: { type: string }
              responsibility: { type: string }
              inputs: { type: array }
              outputs: { type: array }
          environments:
            type: object
            description: "환경별 설정 분리 (dev/staging/prod)"
          state_management:
            type: object
            description: "상태 관리 전략 (backend, locking, drift detection)"
          networking:
            type: object
            description: "네트워크 구성 (VPC, 서브넷, 보안 그룹, LB)"
          cost_estimate:
            type: object
            description: "환경별 예상 비용 범위"
          comp_refs: { type: array, items: { type: string } }
          constraint_refs: { type: array, items: { type: string } }
          code_files: { type: array, items: { type: string } }

  pipeline:
    name: CI/CD 파이프라인
    description: Impl 코드 구조와 IaC 인프라를 기반으로 CI/CD 파이프라인을 자동 생성
    system_prompt: agents/pipeline.md
    prompt_template: prompts/pipeline.md
    interaction_mode: auto
    escalation_condition: "Impl 빌드 구조가 CI 플랫폼의 제약과 충돌하는 경우"
    input:
      impl_output:
        type: object
        required: true
        description: Impl 스킬 산출물 (code_structure, implementation_guide, implementation_map)
      iac_output:
        type: object
        required: true
        description: IaC 에이전트 산출물
    output:
      pipeline_configuration:
        type: object
        description: CI/CD 파이프라인 설정
        properties:
          id: { type: string, pattern: "^PL-\\d{3}$" }
          platform: { type: string, enum: [github-actions, jenkins, gitlab-ci] }
          trigger: { type: object }
          stages:
            type: array
            items:
              name: { type: string }
              commands: { type: array }
              dependencies: { type: array }
              conditions: { type: string }
          caching: { type: object }
          secrets: { type: array }
          environments: { type: array }
          impl_refs: { type: array, items: { type: string } }
          arch_refs: { type: array, items: { type: string } }
          config_files: { type: array, items: { type: string } }

  strategy:
    name: 배포 전략
    description: SLO 목표와 Arch 결정을 기반으로 배포 방식과 롤백 절차를 자동 결정
    system_prompt: agents/strategy.md
    prompt_template: prompts/strategy.md
    interaction_mode: auto
    escalation_condition: "SLO 수준이 요구하는 배포 방식이 인프라 제약(비용, 리소스)과 충돌하는 경우"
    input:
      slo_output:
        type: object
        required: true
        description: SLO 에이전트 산출물
      arch_output:
        type: object
        required: true
        description: Arch 스킬 산출물 (component_structure, architecture_decisions)
      pipeline_output:
        type: object
        required: true
        description: Pipeline 에이전트 산출물
    output:
      deployment_strategy:
        type: object
        description: 배포 전략
        properties:
          deployment_method: { type: string, enum: [blue-green, canary, rolling, recreate] }
          rationale: { type: string }
          rollout_steps: { type: array }
          health_checks: { type: array }
          rollback_trigger: { type: object }
          rollback_procedure: { type: object }
          traffic_management: { type: object }
          deploy_order: { type: array, description: "컴포넌트 배포 순서" }

  monitor:
    name: 모니터링
    description: SLO 정의를 기반으로 알림 규칙과 대시보드를 자동 생성
    system_prompt: agents/monitor.md
    prompt_template: prompts/monitor.md
    interaction_mode: auto
    escalation_condition: "SLO 지표를 기술적으로 측정할 수 없는 경우"
    input:
      slo_output:
        type: object
        required: true
        description: SLO 에이전트 산출물
      arch_output:
        type: object
        required: true
        description: Arch 스킬 산출물 (component_structure, diagrams)
      strategy_output:
        type: object
        required: false
        description: Strategy 에이전트 산출물 (배포 시 모니터링 연동)
    output:
      monitoring_rules:
        type: array
        description: 알림 규칙 목록
        items:
          id: { type: string, pattern: "^MON-\\d{3}$" }
          type: { type: string, enum: [metric, log, trace] }
          condition: { type: string }
          threshold: { type: string }
          severity: { type: string, enum: [critical, warning, info] }
          channel: { type: string }
          slo_refs: { type: array, items: { type: string } }
      dashboards:
        type: array
        description: 대시보드 정의
        items:
          id: { type: string, pattern: "^DASH-\\d{3}$" }
          title: { type: string }
          panels: { type: array }
          format: { type: string, enum: [grafana-json, datadog-json] }
      tracing_config:
        type: object
        description: 분산 추적 설정
        properties:
          sampling_rate: { type: number }
          propagation: { type: string }
          span_attributes: { type: array }

  log:
    name: 로깅
    description: Arch 컴포넌트 구조와 보안 제약을 기반으로 로깅 표준과 설정을 자동 생성
    system_prompt: agents/log.md
    prompt_template: prompts/log.md
    interaction_mode: auto
    escalation_condition: "보안 컴플라이언스 요구사항과 로깅 성능 간 해소 불가능한 충돌"
    input:
      arch_output:
        type: object
        required: true
        description: Arch 스킬 산출물 (component_structure)
      iac_output:
        type: object
        required: true
        description: IaC 에이전트 산출물
    output:
      logging_config:
        type: object
        description: 로깅 설정
        properties:
          format: { type: string, description: "구조화 로그 포맷 (JSON)" }
          levels: { type: object, description: "레벨별 가이드라인" }
          correlation_id: { type: object, description: "상관 ID 전파 방식" }
          masking_rules: { type: array, description: "민감 정보 마스킹 규칙" }
          retention: { type: object, description: "보존 정책" }
          rotation: { type: object, description: "로테이션 정책" }
          config_files: { type: array, items: { type: string } }

  incident:
    name: 인시던트 대응
    description: 배포 전략과 모니터링 설정을 기반으로 인시던트 대응 런북을 자동 생성
    system_prompt: agents/incident.md
    prompt_template: prompts/incident.md
    interaction_mode: auto
    escalation_condition: "없음 — 다른 에이전트 산출물 기반 자동 생성. 품질은 review에서 검증"
    input:
      strategy_output:
        type: object
        required: true
        description: Strategy 에이전트 산출물 (롤백 절차)
      monitor_output:
        type: object
        required: true
        description: Monitor 에이전트 산출물 (알림 규칙)
      arch_output:
        type: object
        required: true
        description: Arch 스킬 산출물 (component_structure)
      iac_output:
        type: object
        required: true
        description: IaC 에이전트 산출물
    output:
      operational_runbooks:
        type: array
        description: 운영 런북 목록
        items:
          id: { type: string, pattern: "^RB-\\d{3}$" }
          title: { type: string }
          trigger_condition: { type: string }
          severity: { type: string, enum: [critical, high, medium, low] }
          symptoms: { type: array, items: { type: string } }
          diagnosis_steps: { type: array }
          remediation_steps: { type: array }
          escalation_path: { type: object }
          rollback_ref: { type: string }
          monitoring_refs: { type: array, items: { type: string } }
          slo_refs: { type: array, items: { type: string } }
          communication_template: { type: object }
          postmortem_template: { type: object }

  review:
    name: DevOps 리뷰
    description: 전체 DevOps 산출물의 정합성, 배포-관찰 피드백 루프의 완전성, 보안/비용을 통합 리뷰
    system_prompt: agents/review.md
    prompt_template: prompts/review.md
    interaction_mode: auto
    escalation_condition: "선행 스킬 계약 위반 수준의 이슈 (Arch 컴포넌트 미매핑, RE 품질 속성 미커버 등)"
    input:
      all_devops_outputs:
        type: object
        required: true
        description: 전체 DevOps 산출물 (4섹션)
      arch_output:
        type: object
        required: true
        description: Arch 스킬 산출물 (추적성 검증 기준)
      impl_output:
        type: object
        required: true
        description: Impl 스킬 산출물 (추적성 검증 기준)
    output:
      review_report:
        type: object
        description: 통합 리뷰 리포트
        properties:
          deploy_observe_loop:
            type: object
            description: "배포-관찰 피드백 루프 검증 결과"
          traceability:
            type: object
            description: "선행 스킬 추적성 검증 결과"
          security_findings:
            type: array
            description: "보안 베스트 프랙티스 검증 결과"
          cost_optimization:
            type: array
            description: "비용 최적화 포인트"
          environment_consistency:
            type: array
            description: "환경 일관성 이슈"
          escalations:
            type: array
            description: "사용자 에스컬레이션 필요 사항"
          auto_fixes:
            type: array
            description: "자동 수정 가능 이슈 및 처리 결과"

pipeline:
  description: >
    전체 파이프라인은 사용자 개입 없이 자동 실행되며, 사용자 접점은
    (1) 선행 결정 실현 불가 시 에스컬레이션과 (2) 최종 결과 보고 두 곳뿐
  stages:
    - agent: slo
      checkpoint: false
      description: RE 품질 속성 메트릭 → SLI/SLO 정의 (전체 기준점 수립)
    - agent: iac
      depends_on: [slo]
      checkpoint: false
      description: Arch 컴포넌트 구조 → IaC 모듈 자동 생성
    - agent: pipeline
      depends_on: [iac]
      checkpoint: false
      description: Impl 코드 구조 + IaC → CI/CD 파이프라인 자동 생성
    - agent: strategy
      depends_on: [slo, pipeline]
      checkpoint: false
      description: SLO + Arch 결정 → 배포 방식/롤백 절차 결정. pipeline에 역반영
    - agent: monitor
      depends_on: [slo]
      parallel_with: [pipeline, strategy]
      checkpoint: false
      description: SLO → 알림 규칙/대시보드 자동 생성
    - agent: log
      depends_on: [iac]
      parallel_with: [monitor]
      checkpoint: false
      description: Arch 컴포넌트 + 보안 제약 → 로깅 표준 자동 생성
    - agent: incident
      depends_on: [strategy, monitor]
      checkpoint: false
      description: strategy 롤백 + monitor 알림 → 런북 자동 생성
    - agent: review
      depends_on: [slo, iac, pipeline, strategy, monitor, log, incident]
      checkpoint: true
      description: 전체 산출물 통합 리뷰 및 최종 결과 보고

  feedback_loops:
    - from: strategy
      to: pipeline
      description: "배포 방식 결정 → pipeline 배포 스테이지에 역반영"
    - from: monitor
      to: strategy
      description: "SLO 번-레이트 알림 → 자동 롤백 트리거 연결"
    - from: slo
      to: strategy
      description: "에러 버짓 잔량 → 배포 빈도/보수성 조절"
    - from: strategy
      to: incident
      description: "롤백 절차 → 런북 조치 절차 포함"
    - from: monitor
      to: incident
      description: "알림 조건 → 런북 트리거 조건 연결"
    - from: log
      to: monitor
      description: "로그 기반 메트릭 → 모니터링 규칙 데이터 소스"

predecessors:
  - skill: arch
    consumes: [architecture_decisions, component_structure, technology_stack, diagrams]
    usage: 인프라 리소스 매핑, 배포 토폴로지, SLO 분배 기준
  - skill: impl
    consumes: [implementation_map, code_structure, implementation_decisions, implementation_guide]
    usage: CI/CD 파이프라인 빌드 스테이지, 의존성 캐싱, 환경 변수 관리
  - skill: re
    consumes_via: "Arch 산출물의 re_refs, constraint_ref를 통한 간접 참조"
    usage: SLO 기준 (품질 속성 메트릭), 배포 제약 (컴플라이언스, 리전)

consumers:
  - skill: management
    consumes: [pipeline_configuration, observability_configuration, operational_runbooks]
    usage: 릴리스 일정, SLO 달성률, 인프라 비용/장애 리스크, 인시던트 회고
  - skill: security
    consumes: [pipeline_configuration, infrastructure_code, observability_configuration]
    usage: 파이프라인 보안 검증, IaC 보안 스캔, 로깅 컴플라이언스
  - skill: qa
    consumes: [pipeline_configuration, observability_configuration]
    usage: CI 품질 게이트 연동, 품질 게이트 판정 기준
