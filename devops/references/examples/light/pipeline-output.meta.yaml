pipeline_config:
  platform: github-actions
  trigger:
    branches: [main]
    tags: ["v*"]
    pull_requests: true
  stages:
    - name: build
      steps: [checkout, setup-python, restore-cache, install, lint, docker-build]
      environment: ci
      condition: always()
    - name: test
      steps: [pytest, upload-coverage]
      environment: ci
      condition: success()
    - name: deploy
      steps: [docker-push, kubectl-set-image, kubectl-rollout-status]
      environment: production
      condition: success() && (branch == 'main' || startsWith(ref, 'refs/tags/v'))
  caching:
    dependency_key: requirements.lock
    artifact_paths: []
  secrets:
    - name: AWS_ACCESS_KEY_ID
      source: github-secrets
      injection_method: env
    - name: AWS_SECRET_ACCESS_KEY
      source: github-secrets
      injection_method: env
    - name: DATABASE_URL
      source: github-secrets
      injection_method: env
  environments:
    - name: production
      promotion_rule: auto-on-green
      approval_required: false
  deployment_method: rolling
  deployment_rationale: "SLO target 99.5% allows near-zero downtime rolling updates without canary/blue-green overhead"
  rollback_trigger:
    conditions:
      - type: error_rate
        threshold: "1%"
        slo_ref: SLO-001
      - type: latency_p99
        threshold: "500ms"
        slo_ref: SLO-002
  rollback_procedure:
    steps:
      - "kubectl rollout undo deployment/todo-api"
      - "kubectl rollout status deployment/todo-api --timeout=120s"
      - "Verify error rate returns below 1% within 5 minutes"
      - "Notify #deploy-alerts with deployment ID and rollback reason"
    verification: "Confirm error rate and latency return below SLO threshold for 5 minutes"
    notification: "#deploy-alerts"
  impl_refs: [IMPL-CODE-001]
  arch_refs: [ARCH-COMP-001]
  config_files:
    - path: .github/workflows/ci-cd.yml
      purpose: Combined CI/CD pipeline
