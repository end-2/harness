test_suite:
  - id: TS-002
    type: unit
    title: Payments orchestrator unit tests
    target_module: src/orchestrator/
    framework: "pytest 8.x"
    test_files:
      - tests/orchestrator/test_payment.py
      - tests/orchestrator/test_idempotency.py
    re_refs: [FR-002, FR-003, FR-004, FR-005]
    arch_refs: [ARCH-COMP-002]
    impl_refs: [IMPL-MAP-002, IMPL-IDR-001]
    test_cases:
      - case_id: TS-002-C01
        description: initiate payment with valid card returns pending state
        technique: example_based
        acceptance_criteria_ref: FR-002.AC-1
        given: a customer with a valid tokenised card
        when: 'POST /payments with {amount: 1000, currency: USD, card_token: tok_ok}'
        then: '201 with body {state: pending, id: <uuid>} and a store row exists'
        test_node: tests/orchestrator/test_payment.py::test_initiate_returns_pending
      - case_id: TS-002-C02
        description: duplicate idempotency key returns original payment
        technique: state_transition
        acceptance_criteria_ref: FR-005.AC-1
        given: a payment was already initiated with idempotency key K1
        when: POST /payments with the same key and the same body
        then: 200 not 201, body equals original payment id, store unchanged
        test_node: tests/orchestrator/test_idempotency.py::test_replay_returns_original
      - case_id: TS-002-C03
        description: refund cannot exceed original amount
        technique: boundary_value
        acceptance_criteria_ref: FR-004.AC-2
        given: a confirmed payment of 10000 cents
        when: 'POST /payments/{id}/refund with {amount: 10001}'
        then: 422 with error refund_exceeds_original, no provider call
        test_node: tests/orchestrator/test_payment.py::test_refund_overflow_rejected
  - id: TS-003
    type: integration
    title: Payments provider contract
    target_module: src/orchestrator/
    framework: "pytest 8.x + httpx"
    test_files:
      - tests/orchestrator/test_provider_contract.py
    re_refs: [FR-002]
    arch_refs: [ARCH-COMP-002]
    impl_refs: [IMPL-MAP-002, IMPL-IDR-002]
    test_cases:
      - case_id: TS-003-C01
        description: provider charge request shape matches recorded fixtures
        technique: decision_table
        acceptance_criteria_ref: FR-002.AC-2
        given: the recorded provider fixtures in tests/fixtures/provider/
        when: orchestrator issues a charge for each (currency, amount) row
        then: outbound HTTP request matches the recorded shape byte-for-byte
        test_node: tests/orchestrator/test_provider_contract.py::test_charge_shape
