section: environment
phase: approved
progress:
  section_completed: 6
  section_total: 6
  percent: 100
approval:
  state: approved
  approver: user
  approved_at: 2026-04-12T10:30:00Z
  notes: Light mode, single service + PostgreSQL
  history:
    - state: approved
      approver: user
      at: 2026-04-12T10:30:00Z
      notes: Light mode, single service + PostgreSQL
upstream_refs:
  - IMPL-MAP-001
  - IMPL-CODE-001
  - IMPL-GUIDE-001
  - DEVOPS-OBS-001
downstream_refs:
  - VERIFY-SC-001
  - VERIFY-RPT-001
document_path: VERIFY-ENV-001.md
