name: ex
version: 1.0.0
description: >
  기존 프로젝트의 코드베이스를 자동 분석하여, LLM 컨텍스트 윈도우에 최적화된
  프로젝트 맵(Project Map)을 생성하는 역방향 탐색(Explorer) 스킬.
  프로젝트 루트 경로만으로 전체 분석을 자동 실행하며,
  4섹션 산출물(프로젝트 구조 맵, 기술 스택 탐지, 컴포넌트 관계 분석, 아키텍처 추론)을 생성한다.

agents:
  scan:
    name: 구조 스캔
    description: 프로젝트 디렉토리 구조 스캔, 파일 분류, 진입점 식별, 적응적 깊이 모드 결정
    system_prompt: agents/scan.md
    prompt_template: prompts/scan.md
    interaction_mode: auto-execute
    escalation_only: true
    adaptive_depth:
      lightweight:
        trigger: "파일 수 ≤ 50개, 언어 1개, 프레임워크 ≤ 1개, 디렉토리 깊이 ≤ 3"
        output: "디렉토리 트리 + 파일 분류 + 진입점 목록 + 설정 파일 목록"
      heavyweight:
        trigger: "파일 수 > 50개 또는 언어 > 1개 또는 프레임워크 > 1개 또는 디렉토리 깊이 > 3"
        output: "상세 디렉토리 트리 + 파일 분류 + 진입점 목록 + 설정 파일 목록 + 디렉토리 규칙 탐지"
    input:
      project_root:
        type: string
        required: true
        description: "분석 대상 프로젝트의 루트 디렉토리 경로"
      exclude_patterns:
        type: array
        required: false
        description: "추가 제외 패턴 (기본: .gitignore + node_modules, .git, __pycache__, dist, build 등)"
        items: { type: string }
      depth_override:
        type: string
        required: false
        description: "경량/중량 모드 수동 지정 (기본: 자동 판별)"
        enum: [lightweight, heavyweight]
    output:
      directory_tree:
        type: string
        required: true
        description: "토큰 효율적 축약 형식의 디렉토리 트리"
      file_classification:
        type: object
        required: true
        description: "파일 유형별 분류 (source, config, test, doc, build, static, other)"
        properties:
          source: { type: array, items: { type: string } }
          config: { type: array, items: { type: string } }
          test: { type: array, items: { type: string } }
          doc: { type: array, items: { type: string } }
          build: { type: array, items: { type: string } }
          static: { type: array, items: { type: string } }
      entry_points:
        type: array
        required: true
        description: "진입점 파일 목록 및 역할 추론"
        items:
          path: { type: string }
          role: { type: string }
      config_files:
        type: array
        required: true
        description: "설정 파일 목록 및 역할"
        items:
          path: { type: string }
          role: { type: string }
          category: { type: string, enum: [build, lint, ci, env, container, package, test, other] }
      depth_mode:
        type: object
        required: true
        description: "적응적 깊이 모드 판정 결과"
        properties:
          mode: { type: string, enum: [lightweight, heavyweight] }
          evidence:
            type: object
            properties:
              file_count: { type: integer }
              language_count: { type: integer }
              framework_count: { type: integer }
              max_directory_depth: { type: integer }
      ignored_patterns:
        type: array
        required: true
        description: ".gitignore 및 분석 제외 패턴"
        items: { type: string }

  detect:
    name: 기술 스택 탐지
    description: 매니페스트 파일, 설정 파일, 코드 패턴을 분석하여 기술 스택 자동 탐지
    system_prompt: agents/detect.md
    prompt_template: prompts/detect.md
    interaction_mode: auto-execute
    escalation_only: true
    input:
      scan_output:
        type: object
        required: true
        description: "scan 에이전트의 전체 출력"
    output:
      tech_stack:
        type: array
        required: true
        description: "탐지된 기술 스택 목록"
        items:
          id: { type: string, pattern: "^TS-\\d{3}$" }
          category: { type: string, enum: [language, framework, database, messaging, build, test, lint, ci, container, infra] }
          name: { type: string }
          version: { type: string }
          evidence: { type: string }
          role: { type: string }
          config_location: { type: string }
      tech_relationships:
        type: array
        required: false
        description: "기술 간 관계 (예: 'TypeScript 프로젝트에서 Jest를 테스트에 사용')"
        items: { type: string }

  analyze:
    name: 의존성/아키텍처 분석
    description: import/require 분석으로 모듈 의존성 그래프 구축, 컴포넌트 경계 추론, 아키텍처 스타일 추론
    system_prompt: agents/analyze.md
    prompt_template: prompts/analyze.md
    interaction_mode: auto-execute
    escalation_only: false
    adaptive_depth:
      lightweight:
        trigger: "scan의 depth_mode가 lightweight"
        output: "디렉토리 기반 컴포넌트 분류 + 간략 의존성 요약"
      heavyweight:
        trigger: "scan의 depth_mode가 heavyweight"
        output: "모듈 의존성 그래프 + 컴포넌트 경계 추론 + API 표면 식별 + 아키텍처 스타일 추론 + 횡단 관심사 탐지"
    input:
      scan_output:
        type: object
        required: true
        description: "scan 에이전트의 전체 출력"
      detect_output:
        type: object
        required: true
        description: "detect 에이전트의 전체 출력"
    output:
      components:
        type: array
        required: true
        description: "모듈/컴포넌트 목록"
        items:
          id: { type: string, pattern: "^CM-\\d{3}$" }
          name: { type: string }
          path: { type: string }
          type: { type: string, enum: [service, library, handler, model, config, util, test] }
          responsibility: { type: string }
          dependencies_internal: { type: array, items: { type: string } }
          dependencies_external: { type: array, items: { type: string } }
          dependents: { type: array, items: { type: string } }
          api_surface: { type: array, items: { type: string } }
          patterns_detected: { type: array, items: { type: string } }
      architecture_inference:
        type: object
        required: true
        description: "아키텍처 추론 결과"
        properties:
          architecture_style: { type: string, enum: [monolithic, modular-monolith, microservices, serverless, layered, hexagonal, event-driven] }
          style_evidence: { type: array, items: { type: string } }
          layer_structure: { type: array, items: { type: string } }
          communication_patterns: { type: array, items: { type: string } }
          data_stores: { type: array, items: { type: string } }
          cross_cutting_concerns: { type: array, items: { type: string } }
          circular_dependencies: { type: array, items: { type: string } }

  map:
    name: 컨텍스트 맵 생성
    description: scan + detect + analyze 결과를 토큰 효율 최적화하여 4섹션 최종 산출물로 통합
    system_prompt: agents/map.md
    prompt_template: prompts/map.md
    interaction_mode: auto-execute
    escalation_only: false
    input:
      scan_output:
        type: object
        required: true
        description: "scan 에이전트의 전체 출력"
      detect_output:
        type: object
        required: true
        description: "detect 에이전트의 전체 출력"
      analyze_output:
        type: object
        required: true
        description: "analyze 에이전트의 전체 출력"
      token_budget:
        type: integer
        required: false
        description: "최종 산출물의 목표 토큰 수 (기본: 4000)"
      focus_areas:
        type: array
        required: false
        description: "특정 디렉토리나 컴포넌트에 집중 분석"
        items: { type: string }
    output:
      project_structure_map:
        type: object
        required: true
        description: "프로젝트 구조 맵"
        properties:
          project_root: { type: string }
          directory_tree: { type: string }
          file_count: { type: object }
          directory_conventions: { type: array, items: { type: string } }
          entry_points: { type: array }
          config_files: { type: array }
          ignored_patterns: { type: array, items: { type: string } }
      technology_stack_detection:
        type: array
        required: true
        description: "기술 스택 탐지 결과"
        items:
          id: { type: string, pattern: "^TS-\\d{3}$" }
          category: { type: string }
          name: { type: string }
          version: { type: string }
          evidence: { type: string }
          role: { type: string }
          config_location: { type: string }
      component_relationship_analysis:
        type: array
        required: true
        description: "컴포넌트 관계 분석 결과"
        items:
          id: { type: string, pattern: "^CM-\\d{3}$" }
          name: { type: string }
          path: { type: string }
          type: { type: string }
          responsibility: { type: string }
          dependencies_internal: { type: array }
          dependencies_external: { type: array }
          dependents: { type: array }
          api_surface: { type: array }
          patterns_detected: { type: array }
      architecture_inference:
        type: object
        required: true
        description: "아키텍처 추론 결과"
        properties:
          architecture_style: { type: string }
          style_evidence: { type: array }
          layer_structure: { type: array }
          communication_patterns: { type: array }
          data_stores: { type: array }
          cross_cutting_concerns: { type: array }
          test_patterns: { type: array }
          build_deploy_patterns: { type: array }
          token_budget_summary: { type: object }

pipeline:
  stages:
    - agent: scan
      checkpoint: false
      description: 프로젝트 디렉토리 구조 스캔, 파일 분류, 적응적 깊이 모드 결정
    - agent: detect
      checkpoint: false
      description: scan 결과 기반 기술 스택 자동 탐지
    - agent: analyze
      checkpoint: false
      description: scan + detect 결과 기반 의존성/아키텍처 분석
    - agent: map
      checkpoint: false
      description: 전체 결과를 토큰 효율적 최종 산출물로 통합

dependencies:
  upstream: []

  consumers:
    - skill: re
      consumes: [project_structure_map, technology_stack_detection, component_relationship_analysis]
      usage: 기존 기능 파악, 도메인 맥락 주입
    - skill: arch
      consumes: [technology_stack_detection, component_relationship_analysis, architecture_inference]
      usage: 기존 기술 제약 및 아키텍처 전제로 반영
    - skill: impl
      consumes: [project_structure_map, technology_stack_detection, component_relationship_analysis]
      usage: 디렉토리 컨벤션, 언어/프레임워크 관용구, 기존 모듈 구조 준수
    - skill: qa
      consumes: [technology_stack_detection, architecture_inference]
      usage: 테스트 프레임워크 선택, 기존 테스트 패턴 준수
    - skill: sec
      consumes: [component_relationship_analysis, architecture_inference]
      usage: 공격 표면 식별, 보안 아키텍처 검증
    - skill: devops
      consumes: [project_structure_map, technology_stack_detection, architecture_inference]
      usage: 빌드/배포 설정, 인프라 요구사항

escalation_conditions:
  - condition: 프로젝트 루트가 존재하지 않거나 접근 불가
    action: 사용자에게 올바른 경로 확인 요청
  - condition: 심볼릭 링크 순환 탐지
    action: 순환 경로를 보고하고 해당 경로 제외 후 계속 진행
  - condition: 매니페스트 파일이 전혀 없는 경우
    action: 파일 확장자 및 코드 패턴 기반 추론으로 대체
  - condition: 암호화된 바이너리 또는 접근 불가 파일
    action: 해당 파일을 건너뛰고 분석 가능한 범위에서 진행

design_principles:
  - name: 코드 기반 (Code-Driven)
    description: 코드베이스 자체를 유일한 진실의 원천으로 사용
  - name: 자동 실행 + 최소 에스컬레이션
    description: 프로젝트 루트 경로만으로 전체 분석 가능, 물리적 불가 시에만 에스컬레이션
  - name: 토큰 효율 (Token Efficiency)
    description: 지정된 토큰 예산 내에서 최대 정보 밀도 달성
  - name: 적응적 깊이 (Adaptive Depth)
    description: 프로젝트 복잡도에 따라 경량/중량 모드 자동 전환
  - name: 비파괴적 분석 (Non-destructive)
    description: 프로젝트 파일을 절대 수정하지 않음, 읽기 전용 분석만 수행
  - name: 증거 기반 추론 (Evidence-based)
    description: 모든 탐지와 추론에 근거를 명시
