name: arch
version: 1.0.0
description: >
  RE 스킬의 산출물(요구사항 명세, 제약 조건, 품질 속성 우선순위)을 입력으로 받아,
  사용자와의 대화를 통해 기술적 맥락을 파악하고 시스템 구조 설계와 기술 의사결정을 수행하는
  아키텍처(Architecture) 스킬

agents:
  design:
    name: 아키텍처 설계
    description: RE 산출물을 기반으로 사용자와의 대화를 통해 아키텍처를 결정
    system_prompt: agents/design.md
    prompt_template: prompts/design.md
    interaction_mode: multi-turn
    max_turns: 20
    adaptive_depth:
      lightweight:
        trigger: "FR ≤ 5개, NFR ≤ 2개, 품질 속성 ≤ 3개"
        output: "아키텍처 스타일 추천 + 레이어/디렉토리 가이드 + 기술 스택 추천"
      heavyweight:
        trigger: "FR > 5개 또는 NFR > 2개 또는 품질 속성 > 3개"
        output: "컴포넌트 정의 + 커넥터/통신 패턴 + C4 Context/Container 다이어그램 + ADR"
    input:
      requirements_spec:
        type: array
        required: true
        description: "RE spec 산출물 — 기능/비기능 요구사항 명세 (FR-xxx, NFR-xxx)"
        items:
          id: { type: string, pattern: "^(FR|NFR)-\\d{3}$" }
          category: { type: string }
          title: { type: string }
          description: { type: string }
          priority: { type: string, enum: [Must, Should, Could, "Won't"] }
          acceptance_criteria: { type: array, items: { type: string } }
          source: { type: string }
          dependencies: { type: array, items: { type: string } }
      constraints:
        type: array
        required: true
        description: "RE spec 산출물 — 제약 조건 목록"
        items:
          id: { type: string, pattern: "^CON-\\d{3}$" }
          type: { type: string, enum: [technical, business, regulatory, environmental] }
          title: { type: string }
          description: { type: string }
          rationale: { type: string }
          impact: { type: string }
          flexibility: { type: string, enum: [hard, soft, negotiable] }
      quality_attribute_priorities:
        type: array
        required: true
        description: "RE spec 산출물 — 품질 속성 우선순위"
        items:
          attribute: { type: string }
          priority: { type: integer, minimum: 1 }
          description: { type: string }
          metric: { type: string }
          trade_off_notes: { type: string }
    output:
      architecture_decisions:
        type: array
        required: true
        description: 주요 아키텍처 결정과 근거
        items:
          id: { type: string, pattern: "^AD-\\d{3}$" }
          title: { type: string }
          decision: { type: string }
          rationale: { type: string }
          alternatives_considered: { type: array }
          trade_offs: { type: string }
          re_refs: { type: array, items: { type: string } }
      component_structure:
        type: array
        required: true
        description: 시스템 주요 컴포넌트와 관계
        items:
          id: { type: string, pattern: "^COMP-\\d{3}$" }
          name: { type: string }
          responsibility: { type: string }
          type: { type: string, enum: [service, library, gateway, store, queue, ui] }
          interfaces: { type: array }
          dependencies: { type: array, items: { type: string } }
          re_refs: { type: array, items: { type: string } }
      technology_stack:
        type: array
        required: true
        description: 선정된 기술과 근거
        items:
          category: { type: string, enum: [language, framework, database, messaging, infra, tool] }
          choice: { type: string }
          rationale: { type: string }
          decision_ref: { type: string }
          constraint_ref: { type: string }

  review:
    name: 아키텍처 리뷰
    description: design 에이전트의 출력을 RE 품질 속성 메트릭 기반으로 검증
    system_prompt: agents/review.md
    prompt_template: prompts/review.md
    interaction_mode: multi-turn
    max_turns: 10
    input:
      design_output:
        type: object
        required: true
        description: design 에이전트의 산출물 (architecture_decisions, component_structure, technology_stack)
      re_spec:
        type: object
        required: true
        description: RE spec 산출물 (검증 기준으로 사용)
    output:
      review_report:
        type: object
        description: 리뷰 리포트
        properties:
          scenario_validations:
            type: array
            description: RE 메트릭 기반 시나리오별 검증 결과
          constraint_compliance:
            type: array
            description: RE 제약 조건 준수 검증
          traceability:
            type: object
            description: 컴포넌트-요구사항 추적성 검증
          strengths: { type: array }
          weaknesses: { type: array }
          risks: { type: array }
          improvements: { type: array }
          escalations:
            type: array
            description: 사용자 확인 필요 사항
      verdict:
        type: string
        enum: [APPROVED, CONDITIONAL, REJECTED]
        description: 최종 판정

  adr:
    name: ADR 생성
    description: design 에이전트가 내린 주요 결정을 Architecture Decision Record로 기록
    system_prompt: agents/adr.md
    prompt_template: prompts/adr.md
    interaction_mode: multi-turn
    max_turns: 5
    input:
      architecture_decisions:
        type: array
        required: true
        description: design 에이전트의 아키텍처 결정 요약
    output:
      adrs:
        type: array
        description: ADR 문서 목록
        items:
          id: { type: string, pattern: "^ADR-\\d{3}$" }
          title: { type: string }
          status: { type: string, enum: [proposed, accepted, deprecated, superseded] }
          context: { type: string }
          decision: { type: string }
          consequences: { type: string }
          alternatives: { type: array }
          re_refs: { type: array, items: { type: string } }
          relations: { type: array }

  diagram:
    name: 다이어그램 생성
    description: design 에이전트의 확정된 설계를 Mermaid 다이어그램으로 시각화
    system_prompt: agents/diagram.md
    prompt_template: prompts/diagram.md
    interaction_mode: multi-turn
    max_turns: 5
    adaptive_depth:
      lightweight:
        output: "C4 Context 다이어그램"
      heavyweight:
        output: "C4 Context + Container 다이어그램 + 주요 시퀀스 다이어그램"
    input:
      component_structure:
        type: array
        required: true
        description: design 에이전트의 컴포넌트 구조
      technology_stack:
        type: array
        required: true
        description: design 에이전트의 기술 스택
    output:
      diagrams:
        type: array
        description: 다이어그램 목록
        items:
          type: { type: string, enum: [c4-context, c4-container, sequence, data-flow] }
          title: { type: string }
          format: { type: string, enum: [mermaid] }
          code: { type: string }
          description: { type: string }

pipeline:
  stages:
    - agent: design
      checkpoint: true
      description: RE 산출물 기반 아키텍처 설계 및 사용자와 기술적 맥락 대화
    - agent: adr
      checkpoint: true
      description: 주요 아키텍처 결정을 ADR로 기록
    - agent: diagram
      checkpoint: true
      description: 확정된 설계를 다이어그램으로 시각화
    - agent: review
      checkpoint: true
      description: RE 메트릭 기반 시나리오 검증 및 최종 승인

dependencies:
  upstream:
    - skill: re
      agent: spec
      consumes: [requirements_spec, constraints, quality_attribute_priorities]
      usage: 아키텍처 드라이버 및 설계 제약의 근거

consumers:
  - skill: impl
    consumes: [architecture_decisions, component_structure, technology_stack]
    usage: 구현 단위, 언어/프레임워크, 설계 의도 전달
  - skill: qa
    consumes: [component_structure, architecture_decisions]
    usage: 테스트 범위/경계, 컴포넌트 간 통합 테스트 대상
  - skill: security
    consumes: [architecture_decisions, component_structure, technology_stack]
    usage: 위협 모델링, 보안 아키텍처 검증
  - skill: deployment
    consumes: [component_structure, technology_stack]
    usage: 배포 단위, 인프라 요구사항
  - skill: operation
    consumes: [component_structure, technology_stack]
    usage: 운영 대상, 모니터링 포인트

architecture_patterns:
  catalog:
    - name: monolithic
      description: 단일 배포 단위의 모놀리식 아키텍처
      when: "소규모 팀, 단순한 도메인, 빠른 MVP"
    - name: modular-monolith
      description: 모듈 경계가 명확한 모놀리식 아키텍처
      when: "중규모 팀, 향후 분리 가능성, 도메인 경계 존재"
    - name: microservices
      description: 독립 배포 가능한 서비스 단위 아키텍처
      when: "대규모 팀, 독립 배포 필요, 이질적 기술 스택"
    - name: event-driven
      description: 이벤트 기반 비동기 통신 아키텍처
      when: "높은 처리량, 느슨한 결합, 비동기 워크플로우"
    - name: layered
      description: 계층형 아키텍처 (Presentation-Business-Data)
      when: "전통적 웹 애플리케이션, 명확한 관심사 분리"
    - name: hexagonal
      description: 포트와 어댑터 기반 헥사고날 아키텍처
      when: "도메인 로직 중심, 외부 의존 교체 가능성, 테스트 용이성 중요"
    - name: serverless
      description: 서버리스 함수 기반 아키텍처
      when: "이벤트 드리븐 워크로드, 비용 최적화, 관리 오버헤드 최소화"
